name: flutter_gen_ai_chat_ui
description: "AI chat UI for Flutter. Streaming text, markdown, LaTeX, rich inline widgets, function-calling/agent surface, RTL, theming. ChatGPT/Claude/Gemini ready."
version: 2.11.1
homepage: https://github.com/hooshyar/flutter_gen_ai_chat_ui
repository: https://github.com/hooshyar/flutter_gen_ai_chat_ui
issue_tracker: https://github.com/hooshyar/flutter_gen_ai_chat_ui/issues
documentation: https://github.com/hooshyar/flutter_gen_ai_chat_ui/blob/main/README.md
funding:
  - https://github.com/sponsors/hooshyar
topics: [ai, chat, llm, streaming, agent, markdown, rtl, openai, anthropic, gemini]

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ">=2.19.0 <4.0.0"
  flutter: ">=3.7.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_markdown_plus: ^1.0.3
  google_fonts: ^8.1.0
  shimmer: ^3.0.0
  flutter_streaming_text_markdown: ^1.8.0
  url_launcher: ^6.3.1
  flutter_math_fork: ^0.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  speech_to_text: ^7.2.0
  network_image_mock: ^2.1.1
  integration_test:
    sdk: flutter
  provider: ^6.1.2

flutter:
  uses-material-design: true
